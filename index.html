<!DOCTYPE html>
<html>
<head>
  <title>Pro Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🌐 Pro Translator</h1>

  <div class="card">
    <textarea id="inputText" placeholder="Enter text..."></textarea>

    <div class="controls">
      <select id="fromLang">
        <option value="en">English</option>
        <option value="hi">Hindi</option>
      </select>

      <button class="swap-btn" onclick="swapLang()">⇄</button>

      <select id="toLang">
        <option value="hi">Hindi</option>
        <option value="en">English</option>
      </select>
    </div>

    <button class="translate-btn" onclick="translateText()">Translate</button>

    <textarea id="outputText" placeholder="Translation..." readonly></textarea>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
